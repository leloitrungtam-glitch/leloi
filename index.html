                            if(block.type === 'teacher') {
                                if(window[`customTeacherSwiper_${bIndex}`]) window[`customTeacherSwiper_${bIndex}`].destroy(true, true);
                                window[`customTeacherSwiper_${bIndex}`] = new Swiper(`.customTeacherSwiper-${bIndex}`, { slidesPerView: 1, spaceBetween: 20, autoplay: { delay: 3000, disableOnInteraction: false }, pagination: { el: '.swiper-pagination', clickable: true }, breakpoints: { 768: { slidesPerView: 3, spaceBetween: 30 } } });
                            } else if (block.type === 'tech') {
                                if(window[`customTechSwiper_${bIndex}`]) window[`customTechSwiper_${bIndex}`].destroy(true, true);
                                window[`customTechSwiper_${bIndex}`] = new Swiper(`.customTechSwiper-${bIndex}`, { slidesPerView: 1, spaceBetween: 20, autoplay: { delay: 3500, disableOnInteraction: false }, pagination: { el: '.swiper-pagination', clickable: true }, breakpoints: { 768: { slidesPerView: 2, spaceBetween: 20 }, 1024: { slidesPerView: 3, spaceBetween: 30 } } });
                            } else if (block.type === 'english') {
                                if(window[`customEnglishSwiper_${bIndex}`]) window[`customEnglishSwiper_${bIndex}`].destroy(true, true);
                                window[`customEnglishSwiper_${bIndex}`] = new Swiper(`.customEnglishSwiper-${bIndex}`, { slidesPerView: 1, spaceBetween: 20, autoplay: { delay: 4000, disableOnInteraction: false }, pagination: { el: '.swiper-pagination', clickable: true }, breakpoints: { 768: { slidesPerView: 2, spaceBetween: 20 }, 1024: { slidesPerView: 3, spaceBetween: 30 } } });
                            }
                        });
                    }
                    AOS.refresh(); 
                }, 300);
            }
        });

        heroSection.style.backgroundImage = backgroundImages[0];
        updateIndicators();
        
        setInterval(() => { 
            if (backgroundImages.length > 0) {
                currentIndex = (currentIndex + 1) % backgroundImages.length; 
                heroSection.style.backgroundImage = backgroundImages[currentIndex]; 
                updateIndicators(); 
            }
        }, 3000);

        // KHÚC DƯỚI NÀY ĐÃ ĐƯỢC CHỈNH SỬA - ĐẨY LÊN FIREBASE THAY VÌ GOOGLE SHEETS
        document.getElementById('form1').addEventListener('submit', async function (e) {
            e.preventDefault(); 
            const name = document.getElementById('parent_name').value; 
            const phone = document.getElementById('parent_phone').value; 
            const ageGroup = document.getElementById('program_code').value; 
            const courseGroup = document.getElementById('course_code').value; 
            
            document.getElementById('loading').style.display = 'flex';
            try { 
                // Sử dụng hàm push của Firebase để lưu dữ liệu vào bảng 'registrations'
                await push(ref(db, "registrations"), {
                    parentName: name,
                    phone: phone,
                    ageGroup: ageGroup,
                    course: courseGroup,
                    timestamp: serverTimestamp()
                });
                
                document.getElementById('loading').style.display = 'none'; 
                const regModal = bootstrap.Modal.getInstance(document.getElementById('registrationModal')); 
                if (regModal) { regModal.hide(); } 
                
                Swal.fire({ 
                    title: '✨ Thành công!', 
                    html: `Chào <strong class="text-primary">${name}</strong>!<br>Chuyên viên sẽ gọi đến số <strong class="text-danger">${phone}</strong> để tư vấn.`, 
                    icon: 'success' 
                }); 
                
                this.reset(); 
            } 
            catch (error) { 
                document.getElementById('loading').style.display = 'none'; 
                Swal.fire({ title: 'Rất tiếc!', text: 'Lỗi kết nối.', icon: 'error' }); 
            }
        });
    </script>
</body>
</html>
